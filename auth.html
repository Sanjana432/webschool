<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web School - Sign In / Sign Up</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <main class="auth-page">
        <section class="auth-shell">
            <div class="auth-card">
                <div class="auth-tabs" role="tablist" aria-label="Authentication mode">
                    <button class="auth-tab active" data-mode="signin" role="tab" aria-selected="true">Sign In</button>
                    <button class="auth-tab" data-mode="signup" role="tab" aria-selected="false">Sign Up</button>
                </div>

                <div class="auth-pane" id="signin-pane">
                    <h1>Welcome Back</h1>
                    <p>Sign in to continue your learning streak.</p>
                    <form class="auth-form" id="signin-form">
                        <div class="form-group">
                            <label for="signin-email">Email</label>
                            <input type="email" id="signin-email" placeholder="you@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="signin-password">Password</label>
                            <input type="password" id="signin-password" placeholder="••••••••" required>
                        </div>
                        <button class="btn btn-primary" type="submit">Sign In</button>
                    </form>
                </div>

                <div class="auth-pane hidden" id="signup-pane">
                    <h1>Create Account</h1>
                    <p>Join Web School and track your progress lesson by lesson.</p>
                    <form class="auth-form" id="signup-form">
                        <div class="form-group">
                            <label for="signup-name">Full Name</label>
                            <input type="text" id="signup-name" placeholder="Alex Johnson" required>
                        </div>
                        <div class="form-group">
                            <label for="signup-email">Email</label>
                            <input type="email" id="signup-email" placeholder="you@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="signup-password">Password</label>
                            <input type="password" id="signup-password" placeholder="Minimum 8 characters" minlength="8" required>
                        </div>
                        <div class="form-group">
                            <label for="signup-track">Primary Track</label>
                            <select id="signup-track" required>
                                <option value="">Select a track</option>
                                <option>HTML</option>
                                <option>CSS</option>
                                <option>JavaScript</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" type="submit">Create Account</button>
                    </form>
                </div>

                <p id="auth-feedback" class="auth-feedback" aria-live="polite"></p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Web School. All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
